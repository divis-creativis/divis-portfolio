<!DOCTYPE html>
<html lang="uk">
<head>
  <a href="../index.html" class="logo">divis-braindancecomics</a>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Comic</title>
  <style>
    :root {
      --bg: #ffffff;
      --line: #0618c9;
      --text: #111;
      --panel-bg: #fff;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --max-width: 1400px;
      --gap: clamp(10px, 1.8vw, 20px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: clamp(14px, 2vw, 28px);
    }

    .page {
      width: min(100%, var(--max-width));
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(22px, 3vw, 38px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #444;
      font-size: clamp(14px, 1.6vw, 16px);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 2px solid var(--line);
      background: var(--line);
      color: #fff;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.secondary {
      background: transparent;
      color: var(--line);
    }

    .status {
      margin: 0 0 18px;
      min-height: 24px;
      color: #444;
      font-size: 14px;
    }

    .comic-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--gap);
    }

 .panel {
  overflow: hidden;
  aspect-ratio: 4 / 3;
}

    .panel img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #ececec;
    }

.panel-number {
  display: none;
}

    .empty-state {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      font-size: 15px;
      line-height: 1.5;
      color: #555;
      background: repeating-linear-gradient(
        -45deg,
        #f8f8f8,
        #f8f8f8 10px,
        #f0f0f0 10px,
        #f0f0f0 20px
      );
    }

    .footer-note {
      margin-top: 14px;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .comic-grid {
        grid-template-columns: 1fr;
      }

      .panel {
        aspect-ratio: 4 / 3;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        
      </div>
      <div>
        <h1 class="title"> </h1>
        <p class="subtitle"> </p>
        <p class="subtitle">This is a true story of reality. Every time the page is refreshed, the comic is reassembled.</p>
      </div>

      <div class="controls">
        <button id="reloadBtn" type="button">Create new comics</button>
      </div>
    </div>

    <p id="status" class="status"> </p>

    <section id="comicGrid" class="comic-grid" aria-label="Комікс з 8 блоків"></section>

    <p class="footer-note">
       
    </p>
  </main>

  <script>
    // =========================
    // НАЛАШТУВАННЯ ПІД ТВОЄ РЕПО
    // =========================
    const GITHUB_OWNER = 'divis-creativis';
    const GITHUB_REPO = 'divis-portfolio';
    const GITHUB_BRANCH = 'main';

    // Сюди поклади всі картинки для коміксу.
    // Наприклад: "projects/comic-panels"
    const IMAGES_FOLDER = 'projects/img_braindance';

    const PANELS_COUNT = 8;
    const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp', '.gif', '.avif'];

    const comicGrid = document.getElementById('comicGrid');
    const statusEl = document.getElementById('status');
    const reloadBtn = document.getElementById('reloadBtn');

    function isImageFile(name = '') {
      const lower = name.toLowerCase();
      return IMAGE_EXTENSIONS.some(ext => lower.endsWith(ext));
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickRandomUnique(items, count) {
      return shuffle(items).slice(0, Math.min(count, items.length));
    }

    function createPanel(imageUrl, altText, index) {
      const article = document.createElement('article');
      article.className = 'panel';

      const num = document.createElement('div');
      num.className = 'panel-number';
      num.textContent = index + 1;

      const img = document.createElement('img');
      img.src = imageUrl;
      img.alt = altText || `Панель коміксу ${index + 1}`;
      img.loading = index < 2 ? 'eager' : 'lazy';
      img.decoding = 'async';

      article.appendChild(num);
      article.appendChild(img);
      return article;
    }

    function createEmptyPanel(message, index) {
      const article = document.createElement('article');
      article.className = 'panel';

      const num = document.createElement('div');
      num.className = 'panel-number';
      num.textContent = index + 1;

      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = message;

      article.appendChild(num);
      article.appendChild(empty);
      return article;
    }

    async function fetchImagesFromGitHub() {
      const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${IMAGES_FOLDER}?ref=${GITHUB_BRANCH}`;
      const response = await fetch(url, {
        headers: {
          'Accept': 'application/vnd.github+json'
        }
      });

      if (!response.ok) {
        throw new Error(`GitHub API error: ${response.status}`);
      }

      const data = await response.json();
      return data
        .filter(item => item.type === 'file' && isImageFile(item.name))
        .map(item => ({
          name: item.name,
          url: item.download_url
        }));
    }

    async function renderComic() {
      comicGrid.innerHTML = '';
      // statusEl.textContent = 'Завантаження кадрів...';
      reloadBtn.disabled = true;

      try {
        const images = await fetchImagesFromGitHub();

        if (!images.length) {
         // statusEl.textContent = 'У вибраній папці не знайдено жодної картинки.';
          for (let i = 0; i < PANELS_COUNT; i++) {
            comicGrid.appendChild(createEmptyPanel('Немає зображень у папці', i));
          }
          return;
        }

        const selected = pickRandomUnique(images, PANELS_COUNT);

        selected.forEach((image, index) => {
          comicGrid.appendChild(createPanel(image.url, image.name, index));
        });

        if (selected.length < PANELS_COUNT) {
          for (let i = selected.length; i < PANELS_COUNT; i++) {
            comicGrid.appendChild(createEmptyPanel('Замало кадрів у папці', i));
          }
        }

        // statusEl.textContent = `Готово: показано ${selected.length} випадкових кадрів з папки ${IMAGES_FOLDER}.`;
      } catch (error) {
        console.error(error);
       // statusEl.textContent = 'Не вдалося підвантажити картинки. Перевір назву репозиторію, гілку та шлях до папки.';
        for (let i = 0; i < PANELS_COUNT; i++) {
          comicGrid.appendChild(createEmptyPanel('Помилка завантаження', i));
        }
      } finally {
        reloadBtn.disabled = false;
      }
    }

    reloadBtn.addEventListener('click', renderComic);
    window.addEventListener('DOMContentLoaded', renderComic);
  </script>
</body>
</html>
