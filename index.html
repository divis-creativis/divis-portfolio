    body {

      background: #ffffff;

    }
    header {
      padding: 1rem;
      background: #fff;
      color: #000;
      text-align: center;
      font-weight: bold;
    }
    .gallery {
      display: grid;
      gap: 1rem;
      padding: 1rem;
      grid-template-columns: 1fr;
    }
    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    /*  box-shadow: 0 4px 12px rgba(0,0,0,.15); */
    }
    /* планшети */
    @media (min-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    /* ноутбуки */
    @media (min-width: 900px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    /* великі екрани */
    @media (min-width: 1200px) {
      .gallery {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
